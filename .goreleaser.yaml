version: 2
builds:
  - id: fuzzer
    skip: true

archives:
  # Linux Archive
  - id: linux-archive
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: 'dist/fuzzer-ubuntu-latest/fuzzer'
        dst: fuzzer
    # Only create this archive for Linux
    if: '{{ eq .Os "linux" }}'

  # macOS Archive
  - id: macos-archive
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: 'dist/fuzzer-macos-latest/fuzzer'
        dst: fuzzer
    # Only create this archive for Darwin (macOS)
    if: '{{ eq .Os "darwin" }}'

  # Windows Archive
  - id: windows-archive
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: 'dist/fuzzer-windows-latest/fuzzer.exe'
        dst: fuzzer.exe
    # Only create this archive for Windows
    if: '{{ eq .Os "windows" }}'
