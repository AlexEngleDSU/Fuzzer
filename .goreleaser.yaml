version: 2
builds:
  - id: fuzzer
    skip: true

archives:
  # Linux Archive
  - id: linux-archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: 'dist/fuzzer-ubuntu-latest/fuzzer'
        dst: fuzzer

  # macOS Archive
  - id: darwin-archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: 'dist/fuzzer-macos-latest/fuzzer'
        dst: fuzzer

  # Windows Archive
  - id: windows-archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [zip]
    files:
      - src: 'dist/fuzzer-windows-latest/fuzzer.exe'
        dst: fuzzer.exe
