name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Dependencies
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libgtk-3-dev
          fi
          
      - name: Disable Windows Defender for build folder
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $path = Join-Path $env:GITHUB_WORKSPACE "bin"
          Add-MpPreference -ExclusionPath $path

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          mkdir -p bin
          EXT=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXT=".exe"
          fi
          # Build CLI
          go build -ldflags="-s -w" -o bin/fuzzerCLI-${{ matrix.os }}${EXT} ./cmd/fuzzerCLI
          # Build UI
          go build -ldflags="-s -w" -o bin/fuzzerUI-${{ matrix.os }}${EXT} ./cmd/fuzzerUI
      - uses: actions/upload-artifact@v4
        with:
          name: fuzzer-${{ matrix.os }}
          path: bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
