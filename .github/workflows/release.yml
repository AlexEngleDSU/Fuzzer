name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # Build natively on Linux, Windows, and macOS
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build Binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            go build -o fuzzer.exe .
          else
            go build -o fuzzer .
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzzer-${{ runner.os }}
          path: |
            fuzzer
            fuzzer.exe
