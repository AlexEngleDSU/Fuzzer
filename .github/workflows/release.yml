name: goreleaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # Define the OS platforms you want to support
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build Binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            go build -o fuzzer.exe .
          else
            go build -o fuzzer .
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzzer-${{ matrix.os }}
          path: |
            fuzzer
            fuzzer.exe
